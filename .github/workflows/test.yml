name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/sync_version.py --check

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v

  app-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev,build]"
      - run: make build-sidecar
      - name: Smoke sidecar status command
        run: |
          BIN=$(ls app/src-tauri/binaries/dataclaw-*)
          BIN="$BIN" python - <<'PY'
          import os
          import subprocess

          subprocess.run(
              [os.environ["BIN"], "status"],
              check=True,
              timeout=15,
          )
          PY
      - run: pnpm -C app install --frozen-lockfile
      - run: pnpm -C app tauri build --bundles app --config '{"bundle":{"createUpdaterArtifacts":false},"plugins":{"updater":{"active":false}}}'
        env:
          APPLE_SIGNING_IDENTITY: "-"
      - run: test -d app/src-tauri/target/release/bundle/macos/DataClaw.app
      - name: Assert sidecar inside app bundle
        run: |
          test -x "app/src-tauri/target/release/bundle/macos/DataClaw.app/Contents/MacOS/dataclaw"
