name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-13
            target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: pip install -e ".[dev,build]"

      - run: make build-sidecar ARCH=${{ matrix.arch }}

      - run: pnpm -C app install --frozen-lockfile

      - name: Import signing assets and build
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: /Users/runner/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/dataclaw-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id-cert.p12"
          export CERT_PATH
          cleanup() {
            security delete-keychain "$KEYCHAIN_PATH" || true
          }
          trap cleanup EXIT

          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERT_P12_BASE64"])
          )
          apple_key_path = Path(os.path.expanduser(os.environ["APPLE_API_KEY_PATH"]))
          apple_key_path.parent.mkdir(parents=True, exist_ok=True)
          apple_key_path.write_bytes(
              base64.b64decode(os.environ["APPLE_API_KEY_P8_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          pnpm -C app tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: dataclaw-${{ matrix.target }}
          if-no-files-found: error
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  publish:
    name: Publish release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ARM64_TARBALL="$(find artifacts/dataclaw-aarch64-apple-darwin -name '*.app.tar.gz' -print -quit)"
          ARM64_SIG="$(find artifacts/dataclaw-aarch64-apple-darwin -name '*.app.tar.gz.sig' -print -quit)"
          X86_TARBALL="$(find artifacts/dataclaw-x86_64-apple-darwin -name '*.app.tar.gz' -print -quit)"
          X86_SIG="$(find artifacts/dataclaw-x86_64-apple-darwin -name '*.app.tar.gz.sig' -print -quit)"
          export ARM64_TARBALL ARM64_SIG X86_TARBALL X86_SIG
          scripts/build-latest-json.sh > latest.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find artifacts -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) | sort)
          ASSETS+=(latest.json)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --generate-notes
          fi
